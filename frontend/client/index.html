<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="Logan Married Student 2nd Stake" />
    <meta property="og:description" content="Community and Leadership Resources" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Logan Married Student 2nd Stake" />
    <meta name="twitter:description" content="Community and Leadership Resources" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Apply stored theme before React boots to prevent flash of unstyled content -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('stake-theme');
          var theme = stored ? JSON.parse(stored).state?.theme : null;
          document.documentElement.classList.add(theme || 'dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
